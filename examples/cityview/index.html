<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>cityview — vienna via heap + picking</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0d1116; color: #ccc; font: 13px system-ui, sans-serif; overflow: hidden; touch-action: none; overscroll-behavior: none; }
      #app { position: fixed; inset: 0; }
      #app canvas { width: 100%; height: 100%; display: block; }
      #status { position: fixed; left: 10px; bottom: 10px; color: #8a9; pointer-events: none; text-shadow: 0 1px 2px #000; }
      #fps { position: fixed; right: 10px; top: 10px; color: #8a9; pointer-events: none; font-family: monospace; text-shadow: 0 1px 2px #000; }
      #info {
        position: fixed; left: 10px; top: 10px; padding: 8px 12px;
        background: rgba(10, 14, 20, 0.85); border: 1px solid #2a3442; border-radius: 6px;
        pointer-events: none; white-space: pre; display: none; font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="status">starting…</div>
    <div id="fps"></div>
    <div id="info"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>wombat.dom — naive heap demo</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #111; font-family: system-ui, sans-serif; color: #ddd;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      body { display: grid; grid-template-rows: auto 1fr auto; }
      header { padding: 12px 16px; border-bottom: 1px solid #333; }
      header h1 { margin: 0; font-size: 14px; font-weight: 500; }
      header span { color: #888; }
      header kbd { color: #aaa; background: #222; padding: 0 4px; border-radius: 3px; font-size: 11px; border: 1px solid #333; }
      #app { display: grid; place-items: center; }
      #app canvas { width: 100%; height: 100%; background: #000; display: block; }
      #status { padding: 12px 16px; border-top: 1px solid #333; font-size: 12px; color: #888; white-space: pre; }
    </style>
  </head>
  <body>
    <header>
      <h1>wombat.dom — <span>naive heap demo</span> &nbsp; <kbd>?count=N</kbd> draws &nbsp; <kbd>drag</kbd> rotate &nbsp; <kbd>wheel</kbd> zoom</h1>
    </header>
    <div id="app"></div>
    <div id="status">initialising…</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
